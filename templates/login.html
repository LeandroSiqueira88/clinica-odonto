<!DOCTYPE html>
<html>
<head>
    <title>OdontoFácil — Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f4c81 0%, #1a7abf 50%, #27ae60 100%);
            padding: 20px;
        }

        .login-box {
            background: white;
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .topo {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo { font-size: 56px; margin-bottom: 10px; }

        .nome-sistema {
            font-size: 30px;
            font-weight: 800;
            color: #0f4c81;
            margin-bottom: 6px;
        }

        .subtitulo {
            font-size: 13px;
            color: #888;
            line-height: 1.5;
        }

        .campo { margin-bottom: 18px; }

        .campo label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 6px;
        }

        .campo input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .campo input:focus { border-color: #0f4c81; }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0f4c81, #1a7abf);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 6px;
            transition: opacity 0.2s, transform 0.1s;
            letter-spacing: 0.5px;
        }

        .btn-login:hover { opacity: 0.92; transform: translateY(-1px); }
        .btn-login:active { transform: translateY(0); }

        .erro-box {
            background: #fef2f2;
            border: 1px solid #fca5a5;
            color: #dc2626;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 18px;
            text-align: center;
        }

        .cadastro-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #888;
        }

        .cadastro-link a {
            color: #0f4c81;
            font-weight: 600;
            text-decoration: none;
        }

        .cadastro-link a:hover { text-decoration: underline; }

        .rodape {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #bbb;
        }
    </style>
</head>
<body>

<div class="login-box">

    <div class="topo">
        <div class="logo">🦷</div>
        <div class="nome-sistema">OdontoFácil</div>
        <div class="subtitulo">Sistema de Agendamento Odontológico Online<br>para o Município</div>
    </div>

    {% if erro %}
    <div class="erro-box">⚠️ {{ erro }}</div>
    {% endif %}

    <form method="POST">
        <div class="campo">
            <label>Email</label>
            <input type="email" name="email" placeholder="seu@email.com" required autofocus>
        </div>
        <div class="campo">
            <label>Senha</label>
            <input type="password" name="senha" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-login">Entrar no Sistema</button>
    </form>

    <div class="cadastro-link">
        Não tem acesso? <a href="/cadastro">Cadastre-se aqui</a>
    </div>

    <div class="rodape">
        OdontoFácil © 2026 — Sistema Municipal de Saúde Bucal
    </div>

</div>

</body>
</html>
