<!DOCTYPE html>
<html>
<head>
    <title>Login - Clínica Odonto</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f4f8fb; }
        .login-box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 320px; }
        .login-box h2 { color: #0f4c81; margin-bottom: 20px; }
        .erro { color: #e74c3c; margin-bottom: 10px; }
        .login-box a { display: block; margin-top: 10px; color: #0f4c81; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🦷 Clínica Odonto</h2>

        {% if erro %}
            <p class="erro">{{ erro }}</p>
        {% endif %}

        <form method="POST">
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="senha" placeholder="Senha" required>
            <button type="submit">Entrar</button>
            <a href="/cadastro">Não tem conta? Cadastre-se</a>
        </form>
    </div>
</body>
</html>
