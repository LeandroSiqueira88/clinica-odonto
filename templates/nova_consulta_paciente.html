{% extends "base.html" %}

{% block content %}

<div class="card">

<h2>Agendar Consulta</h2>

<form method="POST" action="/minha_area/salvar_consulta">

    <p><strong>Paciente:</strong> {{ paciente.nome }}</p>

    <!-- 🦷 DENTISTA -->
    <label>Dentista</label>
    <select name="dentista_id" id="dentista_select" required>
        <option value="">Selecione</option>
        {% for d in dentistas %}
            <option value="{{ d.id }}" data-especialidade="{{ d.especialidade }}">
                {{ d.nome }} - {{ d.especialidade }}
            </option>
        {% endfor %}
    </select>

    <!-- 📅 DATA -->
    <label>Data</label>
    <input type="date" name="data" id="data_input" required>

    <!-- ⏰ HORÁRIO -->
    <label>Hora</label>
    <select name="hora" id="hora_select" required>
        <option value="">Selecione um horário</option>
    </select>

    <!-- 🧠 PROCEDIMENTO -->
    <label>Procedimento</label>
    <select name="procedimento" id="procedimento_select" required>
        <option value="">Selecione</option>
    </select>

    <br><br>
    <button type="submit">Agendar</button>

</form>

</div>

<!-- 🔥 SCRIPT COMPLETO -->
<script>

// 🧠 MAPA PROCEDIMENTO
const mapa = {
    "Endodontia": ["Canal"],
    "Cirurgia": ["Extração"],
    "Dentística": ["Restauração"],
    "Periodontia": ["Raspagem"],
    "Odontopediatria": ["Infantil"],
    "Próteses": ["Prótese"]
};

// 🔹 Atualizar procedimentos
function atualizarProcedimentos() {
    const selectDentista = document.getElementById('dentista_select');
    const especialidade = selectDentista.options[selectDentista.selectedIndex].getAttribute("data-especialidade");

    const selectProc = document.getElementById('procedimento_select');
    selectProc.innerHTML = '<option value="">Selecione</option>';

    if (mapa[especialidade]) {
        mapa[especialidade].forEach(p => {
            let opt = document.createElement('option');
            opt.value = p;
            opt.textContent = p;
            selectProc.appendChild(opt);
        });
    }
}

// 🔹 Validar dia da escala
function validarDia() {
    const dentista = document.getElementById('dentista_select').value;
    const data = document.getElementById('data_input').value;

    if (!dentista || !data) return;

    fetch(`/consultas/verificar_dia?dentista_id=${dentista}&data=${data}`)
        .then(res => res.json())
        .then(resp => {
            if (!resp.valido) {
                alert("Dentista não atende nesse dia!");
                document.getElementById('data_input').value = '';
                limparHorarios();
            }
        });
}

// 🔹 Limpar horários
function limparHorarios() {
    const select = document.getElementById('hora_select');
    select.innerHTML = '<option value="">Selecione um horário</option>';
}

// 🔹 Carregar horários disponíveis
function carregarHorarios() {
    const dentista = document.getElementById('dentista_select').value;
    const data = document.getElementById('data_input').value;

    if (!dentista || !data) return;

    fetch(`/consultas/horarios_disponiveis?dentista_id=${dentista}&data=${data}`)
        .then(response => response.json())
        .then(horarios => {

            const select = document.getElementById('hora_select');
            select.innerHTML = '<option value="">Selecione um horário</option>';

            if (horarios.length === 0) {
                select.innerHTML = '<option value="">Sem horários disponíveis</option>';
                return;
            }

            horarios.forEach(h => {
                const option = document.createElement('option');
                option.value = h;
                option.textContent = h;
                select.appendChild(option);
            });

        })
        .catch(err => {
            console.error("Erro ao carregar horários:", err);
        });
}

// 🎯 EVENTOS
document.getElementById('dentista_select').addEventListener('change', () => {
    atualizarProcedimentos();
    limparHorarios();
});

document.getElementById('data_input').addEventListener('change', () => {
    validarDia();
    carregarHorarios();
});

</script>

{% endblock %}
