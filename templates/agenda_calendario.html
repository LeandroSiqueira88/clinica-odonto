{% extends "base.html" %}

{% block content %}

<div class="card">
    <h2>Agenda (Calendário)</h2>
    <div id="calendar"></div>
</div>

<link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css' rel='stylesheet'>
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>

<script>
document.addEventListener('DOMContentLoaded', function() {

    var calendarEl = document.getElementById('calendar');

    var calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'timeGridWeek',
        locale: 'pt-br',
        height: 650,
        editable: true,

        events: '/consultas/eventos',

        eventClick: function(info) {
            window.location.href = `/consultas/detalhe/${info.event.id}`;
        },

        eventDrop: function(info) {
            const id = info.event.id;
            const data = info.event.startStr.split('T')[0];
            const hora = info.event.startStr.split('T')[1].substring(0,5);

            fetch('/consultas/mover', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id, data, hora })
            });
        }

    });

    calendar.render();
});
</script>

{% endblock %}
