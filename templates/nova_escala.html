{% extends "base.html" %}

{% block content %}

<a href="/escala" style="display:inline-block; padding:7px 16px; background:#6c757d; color:white; border-radius:6px; text-decoration:none; margin-bottom:16px; font-size:14px;">← Escala</a>


<h2>Nova Escala</h2>

<form method="POST" action="/escala/salvar">

    <label>Dentista</label>
    <select name="dentista_id">
        {% for d in dentistas %}
            <option value="{{ d.id }}">{{ d.nome }}</option>
        {% endfor %}
    </select>

    <label>Dia da Semana</label>
    <select name="dia_semana">
        <option>Segunda</option>
        <option>Terça</option>
        <option>Quarta</option>
        <option>Quinta</option>
        <option>Sexta</option>
    </select>

    <label>Hora Início</label>
    <input type="time" name="hora_inicio">

    <label>Hora Fim</label>
    <input type="time" name="hora_fim">

    <button type="submit">Salvar</button>

</form>

{% endblock %}
